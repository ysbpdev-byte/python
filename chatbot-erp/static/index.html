<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Chatbot ERP HRD</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: system-ui, sans-serif;
      background: #f0f2f5;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }

    .chat-container {
      width: 100%;
      max-width: 700px;
      height: 90vh;
      background: white;
      border-radius: 12px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.1);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .chat-header {
      background: #1d4ed8;
      color: white;
      padding: 16px 20px;
      font-weight: 600;
      font-size: 16px;
    }

    .chat-header span {
      font-size: 12px;
      font-weight: 400;
      opacity: 0.8;
      display: block;
      margin-top: 2px;
    }

    .chat-messages {
      flex: 1;
      overflow-y: auto;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .message {
      max-width: 80%;
      padding: 10px 14px;
      border-radius: 12px;
      font-size: 14px;
      line-height: 1.5;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .message.user {
      align-self: flex-end;
      background: #1d4ed8;
      color: white;
      border-bottom-right-radius: 4px;
    }

    .message.assistant {
      align-self: flex-start;
      background: #f1f5f9;
      color: #1e293b;
      border-bottom-left-radius: 4px;
    }

    .message.typing {
      color: #94a3b8;
      font-style: italic;
    }

    .chat-input-area {
      padding: 16px;
      border-top: 1px solid #e2e8f0;
      display: flex;
      gap: 10px;
    }

    .chat-input-area input {
      flex: 1;
      padding: 10px 14px;
      border: 1px solid #cbd5e1;
      border-radius: 8px;
      font-size: 14px;
      outline: none;
      transition: border-color 0.2s;
    }

    .chat-input-area input:focus {
      border-color: #1d4ed8;
    }

    .chat-input-area button {
      padding: 10px 20px;
      background: #1d4ed8;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      cursor: pointer;
      transition: background 0.2s;
    }

    .chat-input-area button:hover { background: #1e40af; }
    .chat-input-area button:disabled { background: #93c5fd; cursor: not-allowed; }
  </style>
</head>
<body>
  <div class="chat-container">
    <div class="chat-header">
      Hato — Asisten ERP Hasta
      <span>Tanya saya tentang menu dan fitur yang tersedia</span>
    </div>

    <div class="chat-messages" id="messages">
      <div class="message assistant">
        Halo! Saya Hato, asisten ERP Hasta. Saya siap membantu kamu menggunakan sistem ERP. Apa yang bisa saya bantu?
      </div>
    </div>

    <div class="chat-input-area">
      <input
        type="text"
        id="input"
        placeholder="Contoh: Saya mau ajukan cuti..."
        autocomplete="off"
      />
      <button id="sendBtn" onclick="sendMessage()">Kirim</button>
    </div>
  </div>

  <script>
    const messagesEl = document.getElementById("messages");
    const inputEl = document.getElementById("input");
    const sendBtn = document.getElementById("sendBtn");

    // history percakapan (tidak termasuk pesan awal dari bot)
    const history = [];

    inputEl.addEventListener("keydown", (e) => {
      if (e.key === "Enter" && !e.shiftKey) sendMessage();
    });

    function appendMessage(role, content) {
      const div = document.createElement("div");
      div.className = `message ${role}`;
      div.textContent = content;
      messagesEl.appendChild(div);
      messagesEl.scrollTop = messagesEl.scrollHeight;
      return div;
    }

    async function sendMessage() {
      const text = inputEl.value.trim();
      if (!text) return;

      inputEl.value = "";
      sendBtn.disabled = true;

      appendMessage("user", text);
      history.push({ role: "user", content: text });

      const replyEl = appendMessage("assistant typing", "Sedang mengetik...");
      let fullReply = "";

      try {
        const res = await fetch("/api/chat", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ messages: history }),
        });

        if (!res.ok) {
          throw new Error("Terjadi kesalahan pada server");
        }

        const reader = res.body.getReader();
        const decoder = new TextDecoder();
        replyEl.className = "message assistant";
        replyEl.textContent = "";

        while (true) {
          const { done, value } = await reader.read();
          if (done) break;
          const token = decoder.decode(value, { stream: true });
          fullReply += token;
          replyEl.textContent = fullReply;
          messagesEl.scrollTop = messagesEl.scrollHeight;
        }

        history.push({ role: "assistant", content: fullReply });
      } catch (err) {
        replyEl.className = "message assistant";
        replyEl.textContent = `Maaf, terjadi kesalahan: ${err.message}`;
      } finally {
        sendBtn.disabled = false;
        inputEl.focus();
      }
    }
  </script>
</body>
</html>
