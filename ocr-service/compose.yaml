services:
  ocr-service:
    image: ccr-2vdh3abv-pub.cnc.bj.baidubce.com/paddlepaddle/paddleocr-vl:latest-nvidia-gpu-sm120-offline
    container_name: ocr-service
    restart: unless-stopped
    ports:
      - "2006:2006"
    volumes:
      - .:/app
    working_dir: /app
    environment:
      - MODEL_IDLE_TIMEOUT=300
    command: >
      bash -c "pip install -r requirements.txt --quiet &&
               uvicorn main:app --host 0.0.0.0 --port 2006"
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
